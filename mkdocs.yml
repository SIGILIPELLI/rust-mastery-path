site_name: Rust Mastery Path
site_description: A structured, module-wise Rust training program from entry level to master level.
site_url: https://sigilipelli.github.io/rust-mastery-path/
repo_url: https://github.com/SIGILIPELLI/rust-mastery-path
repo_name: rust-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Program": level-1/01-setup.md
      - "02 · Variables, Types & Ownership Basics": level-1/02-variables-types-ownership.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Functions": level-1/04-functions.md
      - "05 · Structs & Enums": level-1/05-structs-enums.md
      - "06 · Collections (Vec, String, HashMap)": level-1/06-collections.md
      - "07 · Error Handling Basics (Option, Result)": level-1/07-error-handling-basics.md
      - "08 · Pattern Matching": level-1/08-pattern-matching.md
      - "09 · Modules & Cargo Project Structure": level-1/09-modules-cargo.md
      - "10 · Project — CLI To-Do App": level-1/10-project-todo-cli.md
  - "Level 2 · Intermediate":
      - Overview: level-2/index.md
      - "01 · Ownership & Borrowing Deep Dive": level-2/01-ownership-borrowing.md
      - "02 · Lifetimes": level-2/02-lifetimes.md
      - "03 · Traits & Generics": level-2/03-traits-generics.md
      - "04 · Closures & Iterators": level-2/04-closures-iterators.md
      - "05 · Error Handling Advanced": level-2/05-error-handling-advanced.md
      - "06 · Testing in Rust": level-2/06-testing.md
